<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    :root {
        --bg: #282a36;
        --fg: #f8f8f2;
        --line-nr: #6272a4;
        --selection: #44475a;
        --kw: #ff79c6;
        --str: #f1fa8c;
        --cmt: #6272a4;
        --fn: #50fa7b;
        --typ: #8be9fd;
        --num: #bd93f9;
        --font-size: 14px;
        --font-family: "SF Mono", ui-monospace, Menlo, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        height: 100%;
        background: transparent;
        overflow: hidden;
    }

    .editor-container {
        position: relative;
        width: 100%;
        height: 100%;
        font-family: var(--font-family);
        font-size: var(--font-size);
        line-height: 1.6;
        tab-size: 4;
    }

    pre {
        position: absolute;
        inset: 0;
        margin: 0;
        padding: 16px;
        overflow: auto;
        pointer-events: none;
        white-space: pre-wrap;
        word-wrap: break-word;
        background: transparent;
    }

    pre code {
        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
        background: transparent;
    }

    textarea {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        padding: 16px;
        border: none;
        outline: none;
        resize: none;
        background: transparent;
        color: transparent;
        caret-color: var(--fg);
        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
        white-space: pre-wrap;
        word-wrap: break-word;
        -webkit-text-fill-color: transparent;
        overflow: auto;
        tab-size: 4;
        -moz-tab-size: 4;
    }

    textarea::selection {
        background: var(--selection);
    }

    textarea::-webkit-scrollbar { display: none; }

    /* hljs overrides — driven by CSS variables */
    .hljs { background: transparent !important; color: var(--fg); }
    .hljs-keyword, .hljs-selector-tag, .hljs-built_in, .hljs-meta { color: var(--kw); }
    .hljs-string, .hljs-attr, .hljs-template-tag, .hljs-template-variable { color: var(--str); }
    .hljs-comment, .hljs-quote, .hljs-doctag { color: var(--cmt); font-style: italic; }
    .hljs-title, .hljs-title\.function_, .hljs-section { color: var(--fn); }
    .hljs-type, .hljs-title\.class_, .hljs-title\.class_\.inherited__ { color: var(--typ); }
    .hljs-number, .hljs-literal, .hljs-symbol, .hljs-bullet { color: var(--num); }
    .hljs-variable, .hljs-params { color: var(--fg); }
    .hljs-addition { color: var(--str); }
    .hljs-deletion { color: var(--kw); }
    .hljs-emphasis { font-style: italic; }
    .hljs-strong { font-weight: bold; }
</style>
</head>
<body>
<div class="editor-container">
    <pre><code id="output" class="hljs"></code></pre>
    <textarea id="input" spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off"></textarea>
</div>

<script src="highlight.min.js"></script>
<script>
(function() {
    "use strict";

    const input  = document.getElementById("input");
    const output = document.getElementById("output");
    const root   = document.documentElement;

    let currentLanguage = "auto";
    let debounceTimer = null;

    function highlight() {
        const code = input.value;
        output.textContent = code;

        if (code.length === 0) {
            output.innerHTML = "";
            return;
        }

        output.removeAttribute("data-highlighted");

        if (currentLanguage === "auto") {
            output.className = "hljs";
            hljs.highlightElement(output);
        } else {
            output.className = "hljs language-" + currentLanguage;
            hljs.highlightElement(output);
        }
    }

    function sendCode() {
        window.webkit.messageHandlers.bridge.postMessage({
            type: "codeChanged",
            payload: input.value
        });
    }

    input.addEventListener("input", function() {
        highlight();
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(sendCode, 60);
    });

    input.addEventListener("scroll", function() {
        const pre = output.parentElement;
        pre.scrollTop  = input.scrollTop;
        pre.scrollLeft = input.scrollLeft;
    });

    // Handle Tab key for indentation
    input.addEventListener("keydown", function(e) {
        if (e.key === "Tab") {
            e.preventDefault();
            const start = this.selectionStart;
            const end   = this.selectionEnd;
            this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 4;
            highlight();
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(sendCode, 60);
        }
    });

    // --- Swift → JS API ---

    window.applyTheme = function(theme) {
        root.style.setProperty("--bg",  theme.backgroundColor);
        root.style.setProperty("--fg",  theme.foregroundColor);
        root.style.setProperty("--selection", theme.selectionColor);
        root.style.setProperty("--kw",  theme.keywords);
        root.style.setProperty("--str", theme.strings);
        root.style.setProperty("--cmt", theme.comments);
        root.style.setProperty("--fn",  theme.functions);
        root.style.setProperty("--typ", theme.types);
        root.style.setProperty("--num", theme.numbers);
        document.body.style.backgroundColor = theme.backgroundColor;
        highlight();
    };

    window.setFontSize = function(px) {
        root.style.setProperty("--font-size", px + "px");
    };

    window.setLanguage = function(lang) {
        currentLanguage = lang;
        highlight();
    };

    window.setCode = function(code) {
        input.value = code;
        highlight();
    };

    window.getCode = function() {
        return input.value;
    };

    // Signal readiness
    window.webkit.messageHandlers.bridge.postMessage({
        type: "ready",
        payload: ""
    });
})();
</script>
</body>
</html>
