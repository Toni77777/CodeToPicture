<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link id="hljs-theme" rel="stylesheet" href="dracula.min.css">
<style>
    :root {
        --font-size: 14px;
        --font-family: "SF Mono", ui-monospace, Menlo, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        height: 100%;
        background: transparent;
        overflow: hidden;
    }

    .editor-container {
        position: relative;
        width: 100%;
        height: 100%;
        font-family: var(--font-family);
        font-size: var(--font-size);
        line-height: 1.6;
        tab-size: 4;
    }

    pre {
        position: absolute;
        inset: 0;
        margin: 0;
        padding: 16px;
        overflow: auto;
        pointer-events: none;
        white-space: pre-wrap;
        word-wrap: break-word;
    }

    pre code {
        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
    }

    /* Let hljs CSS control pre/code background; make container transparent */
    pre code.hljs { padding: 0; }

    textarea {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        padding: 16px;
        border: none;
        outline: none;
        resize: none;
        background: transparent;
        color: transparent;
        caret-color: #f8f8f2;
        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
        white-space: pre-wrap;
        word-wrap: break-word;
        -webkit-text-fill-color: transparent;
        overflow: auto;
        tab-size: 4;
        -moz-tab-size: 4;
    }

    textarea::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div class="editor-container">
    <pre><code id="output" class="hljs"></code></pre>
    <textarea id="input" spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off"></textarea>
</div>

<script src="highlight.min.js"></script>
<script>
(function() {
    "use strict";

    const input  = document.getElementById("input");
    const output = document.getElementById("output");
    const root   = document.documentElement;
    const themeLink = document.getElementById("hljs-theme");

    let currentLanguage = "auto";
    let debounceTimer = null;

    function highlight() {
        const code = input.value;
        output.textContent = code;

        if (code.length === 0) {
            output.innerHTML = "";
            return;
        }

        output.removeAttribute("data-highlighted");

        if (currentLanguage === "auto") {
            output.className = "hljs";
            hljs.highlightElement(output);
        } else {
            output.className = "hljs language-" + currentLanguage;
            hljs.highlightElement(output);
        }
    }

    function sendCode() {
        window.webkit.messageHandlers.bridge.postMessage({
            type: "codeChanged",
            payload: input.value
        });
    }

    function syncCaretColor() {
        const fg = getComputedStyle(output).color;
        if (fg) input.style.caretColor = fg;
    }

    input.addEventListener("input", function() {
        highlight();
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(sendCode, 60);
    });

    input.addEventListener("scroll", function() {
        const pre = output.parentElement;
        pre.scrollTop  = input.scrollTop;
        pre.scrollLeft = input.scrollLeft;
    });

    input.addEventListener("paste", function() {
        setTimeout(function() {
            highlight();
            sendCode();
        }, 0);
    });

    input.addEventListener("keydown", function(e) {
        if (e.key === "Tab") {
            e.preventDefault();
            const start = this.selectionStart;
            const end   = this.selectionEnd;
            this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
            this.selectionStart = this.selectionEnd = start + 4;
            highlight();
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(sendCode, 60);
        }
    });

    // --- Swift → JS API ---

    window.applyTheme = function(name) {
        themeLink.href = name + ".min.css";
        themeLink.onload = function() {
            syncCaretColor();
            highlight();
        };
    };

    window.setFontSize = function(px) {
        root.style.setProperty("--font-size", px + "px");
    };

    window.setLanguage = function(lang) {
        currentLanguage = lang;
        highlight();
    };

    window.setCode = function(code) {
        input.value = code;
        highlight();
    };

    window.getCode = function() {
        return input.value;
    };

    window.pasteText = function(text) {
        var start = input.selectionStart;
        var end = input.selectionEnd;
        input.value = input.value.substring(0, start) + text + input.value.substring(end);
        input.selectionStart = input.selectionEnd = start + text.length;
        highlight();
        sendCode();
    };

    // Set default placeholder code
    var defaultCode = "// Paste or type your code here\nfunc greet(_ name: String) -> String {\n    return \"Hello, \\(name)!\"\n}\n\nprint(greet(\"World\"))";
    input.value = defaultCode;
    highlight();

    // Signal readiness
    window.webkit.messageHandlers.bridge.postMessage({
        type: "ready",
        payload: defaultCode
    });
})();
</script>
</body>
</html>
